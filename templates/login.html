<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        .link-btn {
            background: #eee;
            color: black;
            margin-top: 10px;
        }

        .link-btn:hover {
            background: #ddd;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }

        .forgot {
            display: block;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            text-decoration: none;
        }

        .forgot:hover {
            color: black;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Login with phone</h2>

    <form method="POST">
    <input type="text" name="phone" placeholder="+91XXXXXXXXXX" required>
    <button type="submit">Send OTP</button>
</form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <a href="/register">
        <button class="link-btn" type="button">Register</button>
    </a>

    <a href="/forgot" class="forgot">Forgot Password?</a>
</div>

</body>
</html>
