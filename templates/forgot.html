<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff758c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #ff5e78;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            font-size: 14px;
        }

        .back-btn {
            background: #eee;
            color: black;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Forgot Password</h2>

    <form method="POST">
        <input type="text" name="phone" placeholder="Enter Phone Number" required>
        <button type="submit">Send OTP</button>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    </form>

    <a href="/login">
        <button type="button" class="back-btn">Back to Login</button>
    </a>

</div>

</body>
</html>
